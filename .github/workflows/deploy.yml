name: Deploy to Shin Rental Server (Speed Optimized)

on:
  push:
    branches:
      - main
  # 手動実行も可能にする（デバッグ時に便利です）
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # npmの依存関係をキャッシュ

      # 【高速化 1】Next.js のビルドキャッシュを保持
      - name: ⚡ Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          # package-lock.json が変わった時だけキャッシュを捨てる
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      # 【高速化 2】npm install ではなく npm ci を使用
      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build
        env:
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

      # 【高速化 3】差分のみをFTP転送（デフォルト機能ですが設定を最適化）
      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./ # ログイン直後のディレクトリに直接展開
          # 転送の整合性を高めるオプション
          dry-run: false
          dangerous-clean-slate: false # サーバー側の既存ファイルを消さずに上書き